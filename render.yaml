services:
  - type: web
    name: correm-advisory-api
    runtime: python
    plan: free
    region: singapore
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: DATABASE_URL
        fromDatabase:
          name: correm-advisory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: DATA_DIR
        value: /tmp/correm-advisory

databases:
  - name: correm-advisory-db
    plan: free
    region: singapore
    databaseName: correm_advisory
    user: correm_advisory
